version: "3.9"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    # VULNERABILITY: privileged container — full host kernel access
    privileged: true
    volumes:
      # VULNERABILITY: Docker socket mounted into container — container can control host Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
  db:
    image: mysql:8
    ports:
      # VULNERABILITY: database port exposed on all host interfaces
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
