name: CI
on:
  # VULNERABILITY: pull_request_target runs with write permissions and secrets access
  pull_request_target:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # VULNERABILITY: checking out PR head code in pull_request_target context — untrusted code runs with repo secrets
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # VULNERABILITY: action not SHA-pinned — tag @v4 can be moved to malicious commit
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and test
        run: npm ci && npm test

      # VULNERABILITY: secret value echoed into CI log — visible to anyone with log access
      - name: Debug
        run: echo "API key is ${{ secrets.API_KEY }}"
